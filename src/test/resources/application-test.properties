spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/erp_pymes}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres123}

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.properties.hibernate.hbm2ddl.create_namespaces=true
spring.jpa.show-sql=false
spring.flyway.enabled=false

spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration,org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration
spring.cache.type=simple

app.swagger.enabled=false
app.jwt.secret=integration-test-jwt-secret-key-at-least-32-chars-long

logging.level.com.empresa.erp=WARN
logging.level.org.springframework.security=WARN
