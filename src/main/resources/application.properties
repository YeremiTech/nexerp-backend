# Application
spring.application.name=erp-pymes-backend

# Server
server.port=${SERVER_PORT:8081}

# Datasource
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/erp_pymes}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres123}

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.default_schema=erp
spring.jpa.properties.hibernate.hbm2ddl.create_namespaces=true
spring.jpa.show-sql=${JPA_SHOW_SQL:false}

# Flyway
spring.flyway.enabled=true
spring.flyway.schemas=erp
spring.flyway.default-schema=erp
spring.flyway.create-schemas=true
spring.flyway.locations=classpath:db/migration

# Pagination
spring.data.web.pageable.max-page-size=100
spring.data.web.pageable.default-page-size=10

# Cache / Redis
spring.cache.type=${SPRING_CACHE_TYPE:simple}
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.repositories.enabled=false

# JWT
app.jwt.secret=${JWT_SECRET:${APP_JWT_SECRET:local-development-jwt-key-32-bytes-minimum-2026}}
app.jwt.access-expiration-ms=${JWT_ACCESS_EXPIRATION:${APP_JWT_ACCESS_EXPIRATION_MS:900000}}
app.jwt.refresh-expiration-ms=${JWT_REFRESH_EXPIRATION:${APP_JWT_REFRESH_EXPIRATION_MS:604800000}}

# Local bootstrap user for empty development databases
app.local.bootstrap-enabled=${APP_LOCAL_BOOTSTRAP_ENABLED:true}
app.local.admin.username=${APP_LOCAL_ADMIN_USERNAME:admin}
app.local.admin.email=${APP_LOCAL_ADMIN_EMAIL:admin@local.dev}
app.local.admin.password=${APP_LOCAL_ADMIN_PASSWORD:admin12345}

# Session
app.session.presence.away-seconds=${APP_SESSION_AWAY_SECONDS:210}
app.session.presence.disconnect-seconds=${APP_SESSION_DISCONNECT_SECONDS:420}

# CORS / Swagger
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:4300}
app.swagger.enabled=${APP_SWAGGER_ENABLED:false}

# Springdoc
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# Logging
logging.level.com.empresa.erp=${APP_LOG_LEVEL:INFO}
logging.level.org.springframework.security=${SECURITY_LOG_LEVEL:WARN}
